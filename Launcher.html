<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edabeast Games</title>
  <link rel="icon" type="image/png" href="Launcher.png" sizes="16x16" />
  <style>
    :root {
      --bg-color-light: #f8f9fa;
      --text-color-light: #222;
      --card-bg-light: #ffffff;
      --accent-light: #007bff;
      --bg-color-dark: #121212;
      --text-color-dark: #e0e0e0;
      --card-bg-dark: #1e1e1e;
      --accent-dark: #5c8aff;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      transition: background 0.3s, color 0.3s;
    }
    body.light-mode { background: var(--bg-color-light); color: var(--text-color-light); }
    body.dark-mode { background: var(--bg-color-dark); color: var(--text-color-dark); }
    body.small-font { font-size: 14px; }
    body.medium-font { font-size: 16px; }
    body.large-font { font-size: 18px; }
    header { text-align: center; padding: 40px 0 20px; border-bottom: 2px solid var(--accent-dark); }
    header h1 { font-size: 3em; margin: 0; }
    .settings-button {
      position: absolute; top: 20px; left: 20px;
      background: transparent; color: inherit;
      border: 2px solid currentColor; padding: 8px 12px;
      border-radius: 6px; cursor: pointer; font-weight: bold;
    }
    .settings-panel {
      position: fixed; top: 70px; left: 20px;
      background: rgba(255, 255, 255, 0.9); color: #000;
      padding: 20px; border-radius: 10px; display: none;
      z-index: 1000;
    }
    body.dark-mode .settings-panel { background: #222; color: #e0e0e0; }
    .tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #ccc; }
    .tab-button {
      background: none; border: none; padding: 12px 20px;
      cursor: pointer; font-weight: bold; color: inherit;
      border-bottom: 3px solid transparent;
    }
    .tab-button.active {
      border-bottom: 3px solid var(--accent-dark);
      color: var(--accent-dark);
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .game-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .game-card {
      background: var(--card-bg-dark);
      border-radius: 10px; overflow: hidden; text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
    }
    body.light-mode .game-card { background: var(--card-bg-light); }
    .game-card:hover { transform: translateY(-6px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    .game-image {
      width: 100%; height: 150px; object-fit: cover;
    }
    .game-info { padding: 10px; }
    .game-title { font-size: 1.2em; font-weight: bold; margin: 5px 0; }
    .game-desc { font-size: 0.9em; color: inherit; opacity: 0.8; }
    .favorite-btn {
      position: absolute; top: 10px; right: 10px;
      background: none; border: none; cursor: pointer;
      font-size: 1.5em; color: red;
    }
    footer { text-align: center; padding: 30px 0; margin-top: 60px; color: #888; font-size: 0.9em; }
  </style>
</head>
<body class="light-mode medium-font">

<button class="settings-button" onclick="toggleSettings()">⚙ Settings</button>
<div class="settings-panel" id="settingsPanel">
  <p><strong>Settings</strong></p>
  <label><input type="checkbox" id="darkToggle" /> Dark Mode</label><br>
  <label>Font Size
    <select id="fontSizeSelect">
      <option value="small">Small</option>
      <option value="medium" selected>Medium</option>
      <option value="large">Large</option>
    </select>
  </label>
</div>

<header><h1>Edabeast Games</h1></header>

<div class="container">
  <div class="tabs">
    <button class="tab-button active" data-tab="games">Games</button>
    <button class="tab-button" data-tab="betas">Betas</button>
    <button class="tab-button" data-tab="favorites">Favorites</button>
    <button class="tab-button" data-tab="music">Music</button>
  </div>

  <div id="games-content" class="tab-content active">
    <div class="game-grid" id="games-grid"></div>
  </div>

  <div id="betas-content" class="tab-content">
    <div class="game-grid" id="betas-grid"></div>
  </div>

  <div id="favorites-content" class="tab-content">
    <div class="game-grid" id="favorites-grid"></div>
  </div>

  <div id="music-content" class="tab-content">
    <p>Background Music Soundtrack</p>
  </div>
</div>

<footer>&copy; 2025 Edabeast Games.</footer>

<script>
const games = [
  { title: "Tetris", img: "tetris.png", desc: "Classic block-stacking puzzle.", link: "Tetris.html" },
  { title: "Snake", img: "snake.png", desc: "Eat apples and grow the snake.", link: "Snake.html" },
  { title: "Tic-tac-toe", img: "tictactoe.png", desc: "Get three in a row to win.", link: "Tic-tac-toe.html" },
  { title: "Sudoku", img: "sudoku.png", desc: "Fill the grid with numbers 1-9.", link: "Sudoku.html" },
  { title: "Minesweeper", img: "minesweeper.png", desc: "Find the mines without exploding.", link: "Minesweeper.html" },
  { title: "Flappy Bird", img: "flappy.png", desc: "Fly through pipes and survive.", link: "Flappy.html" },
  { title: "Pac-Man", img: "pacman.png", desc: "Eat dots and avoid ghosts.", link: "pac.html" }
];
const betas = [
  { title: "New York Trail", img: "nytrail.png", desc: "Adventure through New York.", link: "NewYorkTrail.html" }
];
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

function renderGames(list, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";
  list.forEach(game => {
    const card = document.createElement("div");
    card.className = "game-card";
    card.innerHTML = `
      <button class="favorite-btn">${favorites.includes(game.title) ? "❤️" : "🤍"}</button>
      <img src="${game.img}" alt="${game.title}" class="game-image">
      <div class="game-info">
        <div class="game-title">${game.title}</div>
        <div class="game-desc">${game.desc}</div>
        <a href="${game.link}" target="_blank">Play</a>
      </div>
    `;
    card.querySelector(".favorite-btn").addEventListener("click", () => toggleFavorite(game.title));
    container.appendChild(card);
  });
}

function toggleFavorite(title) {
  if (favorites.includes(title)) {
    favorites = favorites.filter(f => f !== title);
  } else {
    favorites.push(title);
  }
  localStorage.setItem("favorites", JSON.stringify(favorites));
  renderAll();
}

function renderAll() {
  renderGames(games, "games-grid");
  renderGames(betas, "betas-grid");
  renderGames([...games, ...betas].filter(g => favorites.includes(g.title)), "favorites-grid");
}

document.addEventListener("DOMContentLoaded", () => {
  renderAll();
  document.querySelectorAll(".tab-button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-button").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-content").forEach(tc => tc.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(`${btn.dataset.tab}-content`).classList.add("active");
    });
  });
  const darkToggle = document.getElementById("darkToggle");
  const storedMode = localStorage.getItem("theme") || "light";
  document.body.classList.add(`${storedMode}-mode`);
  darkToggle.checked = storedMode === "dark";
  darkToggle.addEventListener("change", () => {
    const mode = darkToggle.checked ? "dark" : "light";
    document.body.classList.remove("dark-mode", "light-mode");
    document.body.classList.add(`${mode}-mode`);
    localStorage.setItem("theme", mode);
  });
  const fontSizeSelect = document.getElementById('fontSizeSelect');
  const storedFontSize = localStorage.getItem('fontSize') || 'medium';
  applyFontSize(storedFontSize);
  fontSizeSelect.value = storedFontSize;
  fontSizeSelect.addEventListener('change', () => applyFontSize(fontSizeSelect.value));
});

function applyFontSize(size) {
  document.body.classList.remove("small-font", "medium-font", "large-font");
  document.body.classList.add(`${size}-font`);
  localStorage.setItem("fontSize", size);
}

function toggleSettings() {
  const panel = document.getElementById("settingsPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}
</script>
</body>
</html>
